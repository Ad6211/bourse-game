name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install pwa2apk
      run: npm install -g @pwabuilder/pwa2apk
    
    - name: Build APK with PWA2APK
      run: pwa2apk --yes --name "Bourse Game" --package "com.boursegame.game" --version "1.0.0" --app-url "https://github.com/Ad6211/bourse-game/raw/master/index.html"
    
    - name: Find APK files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f
        ls -la
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BourseGame-APK
        path: |
          ./**/*.apk
        if-no-files-found: warn
