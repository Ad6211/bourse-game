name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Generate APK via PWABuilder API
      run: |
        echo "Generating APK via PWABuilder API..."
        curl -X POST "https://pwabuilder.com/api/v1/build" \
          -H "Content-Type: application/json" \
          -d '{"url":"https://github.com/Ad6211/bourse-game/raw/master/manifest.json"}' \
          -o bourse-game.apk
        echo "APK generated successfully"
        ls -la *.apk
    
    - name: Find APK files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f
        ls -la
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BourseGame-APK
        path: |
          ./**/*.apk
        if-no-files-found: warn
