name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli
    
    - name: Prepare web assets
      run: |
        mkdir -p www
        cp index.html www/
        cp style.css www/
        cp game.js www/
        cp manifest.json www/
        cp sw.js www/
        cp icon.png www/
    
    - name: Initialize Capacitor project
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/android@latest
        npx cap init "Bourse Game" "com.boursegame.game" --web-dir www
    
    - name: Add Android platform
      run: npx cap add android
    
    - name: Sync web assets
      run: npx cap sync android
    
    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug -x checkDebugDuplicateClasses
    
    - name: Find and list APK files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f
        echo "=== Checking standard location ==="
        ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Standard location not found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BourseGame-APK
        path: |
          android/app/build/outputs/apk/debug/*.apk
          android/**/*.apk
        compression-level: 0
        if-no-files-found: error
