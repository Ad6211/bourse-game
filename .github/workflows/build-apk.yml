name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Setup Java JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Install Capacitor
      run: npm install -g @capacitor/cli @capacitor/android
    
    - name: Prepare web assets
      run: |
        mkdir -p www
        cp index.html www/
        cp style.css www/
        cp game.js www/
        cp manifest.json www/
        cp sw.js www/
        cp icon.png www/
    
    - name: Initialize Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/android
        npx cap init "Bourse Game" "com.boursegame.game" --web-dir www
    
    - name: Add Android platform
      run: npx cap add android
    
    - name: Copy web assets to Android
      run: npx cap copy android
    
    - name: Configure Gradle to skip duplicate classes check
      run: |
        cd android
        echo "android.enableJetifier=true" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
        ./gradlew assembleDebug --warning-mode=all
    
    - name: Find APK
      run: |
        echo "Looking for APK..."
        find . -name "*.apk" -type f
        ls -la android/app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "Not found in expected location"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BourseGame-APK
        path: |
          android/app/build/outputs/apk/debug/*.apk
          android/**/*.apk
        continue-on-error: true
