<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Bourse Game - Investissez et Gagnez!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1753/1753732.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bourse Game">
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Bourse Game</h1>
            <div class="balance">
                <span class="currency">µ</span>
                <span id="balance">10.00</span>
            </div>
        </header>

        <main>
            <section class="market-section">
                <h2>Marché Boursier</h2>
                <div class="sort-controls">
                    <span class="sort-label">Trier par:</span>
                    <button class="btn-sort" onclick="changeSort('price')">💰 Prix</button>
                    <button class="btn-sort" onclick="changeSort('change')">📊 Variation</button>
                    <button class="btn-sort" onclick="changeSort('name')">📝 Nom</button>
                    <button class="btn-sort" onclick="changeSort('symbol')">🔤 Symbole</button>
                </div>
                <div id="stocks-container"></div>
                <div id="pagination-container"></div>
            </section>

            <section class="alerts-section">
                <h2>⚡ Alertes & Favoris</h2>
                <div class="alerts-grid">
                    <div class="alerts-column">
                        <h3>🔔 Alertes de Prix</h3>
                        <div id="alerts-container"></div>
                    </div>
                    <div class="alerts-column">
                        <h3>⭐ Actions Favorites</h3>
                        <div id="favorites-container"></div>
                    </div>
                </div>
            </section>

            <section class="portfolio-section">
                <h2>Votre Portefeuille</h2>
                <div id="portfolio-container"></div>
            </section>

            <section class="upgrades-section">
                <h2>Améliorations</h2>
                <div id="upgrades-container"></div>
            </section>

        <section class="stats-section">
            <h2>Statistiques</h2>
            <div class="stats-grid">
                <div class="stat">
                    <span class="stat-label">Transactions:</span>
                    <span id="transactions">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Profit Total:</span>
                    <span id="total-profit">0.00</span>
                    <span class="currency">µ</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Valeur Portefeuille:</span>
                    <span id="portfolio-value">0.00</span>
                    <span class="currency">µ</span>
                </div>
            </div>
            <div class="save-controls">
                <button class="btn-save" onclick="saveGame()">💾 Sauvegarder</button>
                <button class="btn-load" onclick="loadGame()">📂 Charger</button>
                <button class="btn-reset" onclick="resetGame()">🔄 Réinitialiser</button>
            </div>
        </section>
        </main>

        <footer>
            <p>Conseil: Achetez bas, vendez haut! 🎯</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
